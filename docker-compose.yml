version: '3.8'

# ═══════════════════════════════════════════════════════════
#  OpenClaw Pentester — Stack Multi-Agente Completo
#
#  Agentes:
#    supervisor  → Orquestador (puerto 3001)
#    explorer    → Reconocimiento (puerto 3002)
#    analyst     → Tráfico ZAP (puerto 3003)
#    exploiter   → Explotación (puerto 3004)
#
#  Servicios de apoyo:
#    zap         → OWASP ZAP proxy/scanner (puerto 8080)
#    juiceshop   → Target vulnerable local (puerto 3005)
#    portal      → Portal web de gestión (puerto 4000)
#
#  Para desarrollo: usa pentester/docker/docker-compose.yml (solo ZAP)
#  Variables: copia .env.example → .env
# ═══════════════════════════════════════════════════════════

x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-pentester}
    - HOOKS_TOKEN=${HOOKS_TOKEN:-hooks-secret}
    - ZAP_BASE_URL=http://zap:8080
    - ZAP_API_KEY=${ZAP_API_KEY:-changeme}
    - INTERACTSH_SERVER=${INTERACTSH_SERVER:-https://interact.sh}
    - INTERACTSH_TOKEN=${INTERACTSH_TOKEN:-}
    - PENTEST_DB_PATH=/data/pentest/findings.db
    - REPORTS_DIR=/app/reports
  #extra_hosts:
  #  - "host.docker.internal:host-gateway"
  volumes:
    - ./pentester/skills:/app/pentester/skills
    - ./pentester/agents:/app/pentester/agents
    - ./pentester/mcp:/app/pentester/mcp
    - pentest-db:/data/pentest
    - ./reports:/app/reports
  networks:
    - pentester-net
  depends_on:
    zap:
      condition: service_healthy
  restart: unless-stopped

services:

  supervisor:
    <<: *agent-base
    container_name: agent-supervisor
    ports:
      - "3001:3001"
    volumes:
      - openclaw-state:/root/.openclaw
      - ./pentester/agents/supervisor:/root/.openclaw/workspace
      - ./pentester/skills:/app/pentester/skills
      - ./pentester/agents:/app/pentester/agents
      - ./pentester/config/supervisor.json:/root/.openclaw/openclaw.json
      - pentest-db:/data/pentest
      - ./reports:/app/reports
      - ./tests:/app/tests
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:3001/" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  explorer:
    <<: *agent-base
    container_name: agent-explorer
    ports:
      - "3002:3002"
    volumes:
      - openclaw-state-explorer:/root/.openclaw
      - ./pentester/agents/explorer:/root/.openclaw/workspace
      - ./pentester/skills:/app/pentester/skills
      - ./pentester/agents:/app/pentester/agents
      - ./pentester/config/explorer.json:/root/.openclaw/openclaw.json
      - pentest-db:/data/pentest
    depends_on:
      supervisor:
        condition: service_healthy
      zap:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:3002/" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  analyst:
    <<: *agent-base
    container_name: agent-analyst
    ports:
      - "3003:3003"
    volumes:
      - openclaw-state-analyst:/root/.openclaw
      - ./pentester/agents/analyst:/root/.openclaw/workspace
      - ./pentester/skills:/app/pentester/skills
      - ./pentester/agents:/app/pentester/agents
      - ./pentester/config/analyst.json:/root/.openclaw/openclaw.json
      - pentest-db:/data/pentest
    depends_on:
      explorer:
        condition: service_healthy
      zap:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:3003/" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  exploiter:
    <<: *agent-base
    container_name: agent-exploiter
    ports:
      - "3004:3004"
    volumes:
      - openclaw-state-exploiter:/root/.openclaw
      - ./pentester/agents/exploiter:/root/.openclaw/workspace
      - ./pentester/skills:/app/pentester/skills
      - ./pentester/agents:/app/pentester/agents
      - ./pentester/config/exploiter.json:/root/.openclaw/openclaw.json
      - pentest-db:/data/pentest
    depends_on:
      analyst:
        condition: service_healthy
      zap:
        condition: service_healthy

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: pentester-zap
    environment:
      - JAVA_OPTS=-Xmx512m -Xms128m -XX:MaxMetaspaceSize=256m
    mem_limit: 3g
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.key=${ZAP_API_KEY:-changeme} -config proxy.ip=0.0.0.0 -config proxy.port=8080
    ports:
      - "8080:8080"
    volumes:
      - zap-data:/home/zap/.ZAP
    networks:
      - pentester-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/JSON/core/view/version/?apikey=${ZAP_API_KEY:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: pentester-juiceshop
    ports:
      - "3005:3000"
    networks:
      - pentester-net
    restart: unless-stopped

  # ── Portal Web de Gestión ──────────────────────────────────
  portal:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: openclaw-portal
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=http://localhost:4000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-qIZ1qJ3moVZ8Y/y59ANLEpkWgzLDD+0vUe6XvKfeRq8=}
      - AUTH_TRUST_HOST=true
      - DATABASE_URL=file:/data/webapp.db
      - OPENCLAW_SUPERVISOR_URL=http://supervisor:3001
      - OPENCLAW_EXPLORER_URL=http://explorer:3002
      - OPENCLAW_ANALYST_URL=http://analyst:3003
      - OPENCLAW_EXPLOITER_URL=http://exploiter:3004
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - ZAP_BASE_URL=http://zap:8080
      - ZAP_API_KEY=${ZAP_API_KEY:-changeme}
      - REPORTS_OUTPUT_DIR=/app/generated-reports
    volumes:
      - portal-db:/data
      - portal-reports:/app/generated-reports
    networks:
      - pentester-net
    restart: unless-stopped

volumes:
  zap-data:
    name: pentester-zap-data
  pentest-db:
    name: openclaw-pentester-db
  openclaw-state:
    name: openclaw-pentester-state-supervisor
  openclaw-state-explorer:
    name: openclaw-pentester-state-explorer
  openclaw-state-analyst:
    name: openclaw-pentester-state-analyst
  openclaw-state-exploiter:
    name: openclaw-pentester-state-exploiter
  portal-db:
    name: openclaw-portal-db
  portal-reports:
    name: openclaw-portal-reports

networks:
  pentester-net:
    name: pentester-net
    driver: bridge
